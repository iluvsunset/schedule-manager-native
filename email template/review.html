<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #1d1d1f; line-height: 1.6; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .card { background: #ffffff; border: 1px solid #e5e5e5; border-radius: 12px; overflow: hidden; }
    .header { background: #000000; padding: 32px; text-align: center; }
    .header h1 { color: #ffffff; margin: 0; font-size: 24px; font-weight: 700; }
    .subtitle { color: #86868b; font-size: 14px; margin-top: 8px; }
    .content { padding: 40px 32px; }
    
    .section { margin-bottom: 28px; }
    .section-title { font-size: 11px; text-transform: uppercase; color: #86868b; font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; border-bottom: 1px solid #f0f0f0; padding-bottom: 4px; }
    .section-body { font-size: 15px; color: #1d1d1f; white-space: pre-wrap; }
    
    .meta { display: flex; gap: 20px; margin-bottom: 32px; font-size: 13px; color: #86868b; font-weight: 500; }
    .footer { text-align: center; font-size: 12px; color: #86868b; margin-top: 32px; padding-top: 20px; border-top: 1px solid #f0f0f0; }
    
    .btn { display: inline-block; background: #f5f5f7; color: #1d1d1f; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 13px; border: 1px solid #d2d2d7; font-weight: 500; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <h1>Lesson Review</h1>
        <div class="subtitle">{{place}}</div>
      </div>
      
      <div class="content">
        <div class="meta">
          <div>📅 {{date}}</div>
          <div>✓ Completed</div>
        </div>

        <div class="section">
          <div class="section-title">What was learned</div>
          <div class="section-body">{{review_learned}}</div>
        </div>

        <div class="section">
          <div class="section-title">Insights</div>
          <div class="section-body">{{review_insights}}</div>
        </div>

        <div class="section">
          <div class="section-title">Areas for Improvement</div>
          <div class="section-body">{{review_improve}}</div>
        </div>

        <div class="section">
          <div class="section-title">Additional Notes</div>
          <div class="section-body">{{review_notes}}</div>
        </div>
        
        <div style="text-align: center;">
           <a href="#" class="btn">View Dashboard</a> 
           <!-- Note: User needs to replace # with actual URL in template if static, or pass variable -->
        </div>
      </div>
    </div>
    
    <div class="footer">
      <p style="margin-bottom: 8px;">Evaluation Report Generated by Schedule Manager</p>
      <p style="margin: 0;">&copy; 2026 iluvsunset. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
