<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #1d1d1f; line-height: 1.5; background-color: #ffffff; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .card { background: #ffffff; border: 1px solid #e5e5e5; border-radius: 12px; overflow: hidden; }
    .header { background: #f5f5f7; padding: 24px; text-align: center; border-bottom: 1px solid #e5e5e5; }
    .content { padding: 32px 24px; }
    .schedule-box { background: #fbfbfb; border: 1px solid #f0f0f0; border-radius: 8px; padding: 20px; margin: 24px 0; }
    .row { display: flex; margin-bottom: 12px; align-items: center; }
    .label { width: 80px; font-size: 12px; color: #86868b; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
    .value { font-weight: 500; color: #1d1d1f; flex: 1; }
    .footer { text-align: center; font-size: 12px; color: #86868b; margin-top: 32px; padding-top: 20px; border-top: 1px solid #eaeaea; }
    
    .link-btn { 
      display: inline-block; 
      background: #f5f5f7; 
      color: #1d1d1f !important; 
      padding: 6px 12px; 
      border-radius: 6px; 
      text-decoration: none; 
      font-size: 12px; 
      border: 1px solid #d2d2d7; 
      font-weight: 500;
    }
    .main-btn {
      display: inline-block; 
      background: #0071e3; 
      color: #ffffff !important; 
      padding: 12px 32px; 
      border-radius: 99px; 
      text-decoration: none; 
      font-weight: 600; 
      margin-top: 16px;
      box-shadow: 0 4px 12px rgba(0,113,227,0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <h1 style="margin:0; font-size: 24px; color: #1d1d1f;">Reminder: Class Today</h1>
      </div>
      <div class="content">
        <p>Hi {{to_name}},</p>
        <p>This is a reminder that you have a scheduled class coming up.</p>
        
        <div class="schedule-box">
          <div class="row">
            <div class="label">Event</div>
            <div class="value">{{place}}</div>
          </div>
          <div class="row">
            <div class="label">Time</div>
            <div class="value">{{time}}</div>
          </div>
          <div class="row">
            <div class="label">Location</div>
            <div class="value">
              <a href="{{location}}" class="link-btn">View Location</a>
            </div>
          </div>
        </div>
        
        <p style="font-size: 14px; color: #424245; text-align: center;">Please be ready 5 minutes before start.</p>
        
        <div style="text-align: center; margin-top: 24px;">
          <a href="{{location}}" class="main-btn">Join Class Now</a>
        </div>
      </div>
    </div>
    <div class="footer">
      <p style="margin-bottom: 8px;">Sent via Schedule Manager System</p>
      <p style="margin: 0;">&copy; 2026 iluvsunset. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
