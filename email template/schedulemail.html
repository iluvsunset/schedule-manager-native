<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #1d1d1f; line-height: 1.5; background-color: #ffffff; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .content { padding: 20px 0; }
    .schedule-info { margin: 24px 0; border-left: 3px solid #0071e3; padding-left: 20px; }
    .row { margin-bottom: 12px; display: flex; align-items: center; }
    .label { font-weight: 600; font-size: 12px; color: #86868b; margin-right: 16px; width: 70px; text-transform: uppercase; letter-spacing: 0.5px; }
    .value { font-size: 15px; color: #1d1d1f; flex: 1; font-weight: 500; }
    .footer { font-size: 12px; color: #86868b; margin-top: 40px; border-top: 1px solid #eaeaea; padding-top: 20px; text-align: center; }
    
    .link-btn {
      display: inline-block;
      background: #f5f5f7;
      color: #1d1d1f !important;
      padding: 6px 12px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 12px;
      border: 1px solid #d2d2d7;
      font-weight: 500;
    }
    .main-btn {
      display: inline-block;
      background: #000000;
      color: #ffffff !important;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="content">
      <h2 style="font-weight: 700; margin-top: 0; font-size: 22px; color: #1d1d1f;">New Schedule Added</h2>
      <p>Hi {{to_name}},</p>
      <p>A new event has been added to your calendar.</p>
      
      <div class="schedule-info">
        <div class="row">
          <span class="label">EVENT</span>
          <span class="value" style="font-size: 16px; font-weight: 700;">{{place}}</span>
        </div>
        <div class="row">
          <span class="label">DATE</span>
          <span class="value">{{date}}</span>
        </div>
        <div class="row">
          <span class="label">TIME</span>
          <span class="value">{{time}}</span>
        </div>
        <div class="row">
          <span class="label">LOCATION</span>
          <span class="value"><a href="{{location}}" class="link-btn">Open Link</a></span>
        </div>
      </div>
      
      <p style="font-size: 14px; color: #666; background: #f9f9f9; padding: 16px; border-radius: 8px; line-height: 1.6;">
        <strong style="color: #1d1d1f;">Notes:</strong><br>
        {{notes}}
      </p>
      
      <div style="margin-top: 32px; text-align: center;">
        <a href="{{location}}" class="main-btn">View Full Details</a>
      </div>
    </div>
    
    <div class="footer">
      <p style="margin-bottom: 8px;">Schedule Manager Notification System</p>
      <p style="margin: 0;">&copy; 2026 iluvsunset. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
